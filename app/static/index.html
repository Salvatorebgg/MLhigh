<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MLhigh 临床统计分析</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/static/styles.css?v=v3-params-left" />
    <script src="/static/vendor/plotly.min.js?v=local-3.0.1"></script>
  </head>
  <body>
    <div class="simple-mlhigh-app">
      <aside class="side-nav" aria-label="分析流程">
        <section class="nav-group">
          <nav class="step-nav">
            <button class="nav-step active" data-tab="method" type="button">
              <span>1</span>
              方法选择
            </button>
            <button class="nav-step" data-tab="data" type="button">
              <span>2</span>
              数据上传
            </button>
            <button class="nav-step" data-tab="variables" type="button">
              <span>3</span>
              变量选择
            </button>
            <button class="nav-step" data-tab="result" type="button">
              <span>4</span>
              结果生成
            </button>
          </nav>
        </section>
      </aside>

      <main class="workspace">
        <section class="tab-panel active" id="tab-method" aria-labelledby="method-title">
          <div class="panel-head method-detail-head">
            <div id="methodDetail" class="method-detail" aria-live="polite">
              <div class="method-detail-empty">
                <span>方法概览</span>
                <h1 id="method-title">请选择一个统计方法</h1>
              </div>
            </div>
          </div>

          <div class="method-cat-tabs" id="methodCatTabs">
            <button class="cat-tab active" data-cat="advanced_stats" type="button">高级统计</button>
            <button class="cat-tab" data-cat="ml_models" type="button">机器学习</button>
          </div>

          <div class="method-grid" id="miniMethodGrid">
            <div class="empty-state">正在载入方法目录...</div>
          </div>

          <div class="method-next-bar">
            <button id="methodNextBtn" class="btn btn-primary btn-next" type="button" disabled>下一步</button>
          </div>
        </section>

        <section class="tab-panel" id="tab-data" aria-label="数据上传">
          <div class="panel-head">
            <div class="panel-head-top">
              <div class="current-method-card">
                <span>当前统计方法</span>
                <strong id="dataMethodName">尚未选择方法</strong>
              </div>
              <div id="dataMethodHint" class="data-hint">请先在方法选择界面选定分析方法，再加载或上传数据。</div>
              <div id="dataStatusBar" class="data-status-bar"></div>
            </div>

            <input id="wsFileInput" type="file" accept=".csv,.tsv,.txt,.xlsx,.xls" hidden />

            <div class="data-actions-vert">
              <button id="loadExampleBtn" class="btn btn-primary" type="button">加载示例数据</button>
              <button id="downloadExampleBtn" class="btn" type="button">下载示例数据</button>
              <button id="uploadDataBtn" class="btn" type="button">选择文件</button>
              <input id="uploadedFileNameInput" class="upload-file-name" type="text" value="" placeholder="未选择文件" aria-label="已选择文件" readonly />
              <button id="cancelUploadBtn" class="btn btn-quiet" type="button" disabled>取消上传</button>
            </div>
          </div>

          <div class="dataset-card">
            <div class="dataset-meta" id="wsDataMeta">请先选择统计方法，再上传数据或加载该方法的示例数据。</div>
            <div id="previewHint" class="preview-hint"></div>
            <div id="previewTable" class="table-scroll">
              <div class="empty-state small">等待数据载入</div>
            </div>
          </div>

          <div class="data-next-bar">
            <button id="dataNextBtn" class="btn btn-primary btn-next" type="button" disabled>下一步</button>
          </div>
        </section>

        <section class="tab-panel" id="tab-variables" aria-label="变量选择与参数调节">
          <div class="panel-head">
            <div class="panel-head-top">
              <div class="current-method-card">
                <span>当前统计方法</span>
                <strong id="variableMethodName">尚未选择方法</strong>
              </div>
              <p id="roleSelectionSummary">变量角色和方法参数会按当前统计方法变化。</p>
            </div>

            <div class="panel-params">
              <div class="section-head">
                <h2>参数调节</h2>
                <span id="paramCountLabel">0 项参数</span>
              </div>
              <div id="paramControls" class="param-grid">
                <div class="empty-state small">选择方法后显示该方法可调参数。</div>
              </div>
            </div>
          </div>

          <div class="config-layout">
            <section class="config-section config-section-full">
              <div class="section-head">
                <h2>变量选择</h2>
                <button id="autoRoleBtn" class="text-btn" type="button">自动推荐</button>
              </div>
              <div id="roleControls" class="role-grid">
                <div class="empty-state small">请先载入数据。</div>
              </div>
              <div id="roleValidationMessage" class="validation-message muted">载入数据后会自动推荐变量；如变量不适合当前方法，会在这里说明原因。</div>
            </section>
          </div>

          <div class="run-bar">
            <button id="generateBtn" class="btn btn-primary btn-run" type="button">开始分析</button>
          </div>
        </section>

        <section class="tab-panel" id="tab-result" aria-label="结果生成">
          <div class="panel-head">
            <p id="resultSummary">运行分析后显示结果。</p>
          </div>

          <div class="result-tabs" id="resultTopTabs">
            <button class="result-top-tab active" data-result-tab="chart" type="button">可视化</button>
            <button class="result-top-tab" data-result-tab="tables" type="button">统计结果</button>
            <button class="result-top-tab" data-result-tab="discussion" type="button">结果解读</button>
          </div>

          <div class="result-view active" id="result-view-chart">
            <div id="chartVariantTabs" class="chart-variant-tabs"></div>
            <div class="chart-layout">
              <div id="chartPreviewContainer" class="chart-preview-main">
                <div id="chartActivePlot" class="chart-active-plot">
                  <div class="empty-state">完成分析后展示结果图形。</div>
                </div>
              </div>
              <aside id="chartSettingsPanel" class="chart-settings-panel">
                <div class="export-row">
                  <button class="btn export-btn" data-fmt="png" type="button">PNG</button>
                  <button class="btn export-btn" data-fmt="svg" type="button">SVG</button>
                  <button class="btn export-btn" data-fmt="pdf" type="button">PDF</button>
                  <button class="btn export-btn" data-fmt="csv" type="button">CSV</button>
                </div>
                <h2>图形设置</h2>
                <label class="field field-tight">
                  <span>图表主题</span>
                  <select id="chartThemeSelect">
                    <option value="cnsTheme">临床研究通用</option>
                    <option value="clinicalTheme">临床蓝绿</option>
                    <option value="journalTheme">经典期刊</option>
                    <option value="natureStyleTheme">Nature 风格</option>
                    <option value="lancetTheme">Lancet 风格</option>
                    <option value="nejmTheme">NEJM 风格</option>
                    <option value="scienceTheme">Science 风格</option>
                    <option value="warmTheme">暖色调</option>
                    <option value="coolTheme">冷色调</option>
                    <option value="pastelTheme">柔和色</option>
                    <option value="monoTheme">灰阶</option>
                  </select>
                </label>
                <label class="field field-tight">
                  <span>标准调色盘</span>
                  <select id="chartPaletteSelect">
                    <option value="default">跟随主题</option>
                    <option value="tableau10">Tableau 10</option>
                    <option value="set2">Set2</option>
                    <option value="paired">Paired</option>
                    <option value="dark2">Dark2</option>
                    <option value="accent">Accent</option>
                    <option value="viridis">Viridis</option>
                    <option value="plasma">Plasma</option>
                  </select>
                </label>
                <label class="field field-tight">
                  <span>图表标题</span>
                  <input id="chartTitleInput" type="text" placeholder="可选" />
                </label>
                <div id="appearanceControls" class="appearance-controls"></div>
              </aside>
            </div>
          </div>

          <div class="result-view" id="result-view-tables">
            <div id="resultTablesContainer" class="table-scroll" data-table-export-pdf-template="table-export-pdf-1">
              <div class="empty-state small">表格结果将在分析后显示。</div>
            </div>
          </div>

          <div class="result-view" id="result-view-discussion">
            <div id="discussionContainer" class="discussion-wrap">
              <div class="empty-state small">结果解释将在分析后显示。</div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="/static/js/utils.js?v=v3-params-left"></script>
    <script src="/static/js/chartThemes.js?v=v3-params-left"></script>
    <script src="/static/js/charts.js?v=v3-params-left"></script>
    <script src="/static/js/app.js?v=v3-params-left"></script>
  </body>
</html>
